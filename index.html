<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRIO</title>
  <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

<div class="container">

  <!-- SPLASH SCREEN -->
  <div class="splash">
    <div class="logo">
      <span class="o">O</span>
      <span class="title">TRIO</span>
      <span class="x">X</span>
    </div>

    <p class="tagline">3 in a row. Think smart - Win fast.</p>

    <button onclick="startGame()">Let the Battle Begin</button>
  </div>

  <!-- GAME UI -->
  <div class="game">

    <h1>TRIO</h1>

    <div class="controls">
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="intermediate">Intermediate</option>
        <option value="hard">Hard</option>
      </select>

      <button onclick="replayGame()">Replay</button>
    </div>

    <h2 id="status">Turn: X</h2>

    <div class="scoreboard">
      <div>X: <span id="xScore">0</span></div>
      <div>O: <span id="oScore">0</span></div>
      <div>Draw: <span id="drawScore">0</span></div>
    </div>

    <div class="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

  </div>
</div>

<script src="./JAVASCRIPT/script.js"></script>
</body>
</html>
